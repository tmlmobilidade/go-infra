apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auth-cleaner
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-auth
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: auth-cleaner
    module: auth
    namespace: prd-auth
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-auth-cleaner
      tag: staging
      pullPolicy: Always
    service:
      port: 80
      targetPort: 5050
    ingress:
      enabled: false
    secrets:
      - prd-platform-storage
    env: []
