apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: apex-sync-on-board-sales
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: stg-apex
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: apex-sync-on-board-sales
    module: apex
    namespace: stg-apex
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-apex-sync-on-board-sales
      tag: staging
      pullPolicy: Always
    service:
      port: 80
      targetPort: 5050
    ingress:
      enabled: false
    secrets:
      - stg-platform-storage
    env: []
