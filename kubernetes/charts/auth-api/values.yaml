name: auth-api
namespace: auth

replicas: 1

image:
  repository: ghcr.io/tmlmobilidade/go/auth-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 5050

ingress:
  enabled: true
  className: nginx
  host: auth.tmlmobilidade.pt
  path: /
  annotations: {}

# Shared module secrets (common to all apps in the auth module)
# Reference a Secret that exists in the auth namespace
sharedSecrets:
  - auth-shared-secrets

# App-specific env vars (optional)
env: []