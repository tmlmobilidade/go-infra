apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: apex-organizer
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: apex-stg-pr-395
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: apex-organizer
    module: apex
    namespace: apex-stg-pr-395
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-apex-organizer
      tag: pr-395
      pullPolicy: Always
    service:
      port: 80
      targetPort: 5050
    ingress:
      enabled: false
      className: nginx
      host: pr-395.go-stg.tmlmobilidade.pt
      path: /apex(/|2211)(.*)
      pathType: ImplementationSpecific
      annotations:
        nginx.ingress.kubernetes.io/use-regex: "true"
        nginx.ingress.kubernetes.io/rewrite-target: /22112
    secrets:
      - platform-environment-stg
      - platform-storage-stg
    env: []
