# # #

services:

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 10gb
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    logging:
      options:
        max-size: '1m'
        max-file: '1'
    extra_hosts:
      - "go-prd-clickhouse-1.tmlmobilidade.pt:10.81.101.141"
      - "go-prd-clickhouse-2.tmlmobilidade.pt:10.81.101.142"
      - "go-prd-clickhouse-3.tmlmobilidade.pt:10.81.101.143"
    volumes:
      - /opt/app/persistent-data/data:/var/lib/clickhouse
      - /opt/app/persistent-data/logs:/var/log/clickhouse-server
      - /opt/app/persistent-data/config.d:/etc/clickhouse-server/config.d
      - /opt/app/persistent-data/users.d:/etc/clickhouse-server/users.d
    env_file:
      - /opt/app/secrets/.env
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
