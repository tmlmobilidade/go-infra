# Massive thank you to @ricardojorgerm and @tiagogaspar8
# for the help in creating this nginx configuration file.


# # # #
# USER

user nginx;


# # # #
# WORKER PROCESSES

worker_processes auto;


# # # #
# DEFAULTS

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;


# # # #
# EVENTS

events {
	use epoll;
	worker_connections 8192;
	multi_accept on;
}


# # # #
# HTTP

http {

	# # #
	# MIME TYPES

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	# # #
	# LOGS

	log_format main '$time_iso8601 | $status | IP $remote_addr | Request: "$request" | Referer: "$http_referer" | User Agent: "$http_user_agent"';

	access_log /var/log/nginx/access.log main buffer=32k flush=3s;

	# # #
	# FILE DESCRIPTOR SETTINGS

	aio threads;
	directio 512M;
	output_buffers 2 1M;
	sendfile on;
	tcp_nopush on;

	keepalive_timeout 65;

	# # #
	# RATE LIMITS

	limit_req_zone global zone=global:10m rate=500r/s;
	limit_req zone=global burst=200 delay=2;

	limit_req_zone $binary_remote_addr zone=ip:10m rate=50r/s;
	limit_req zone=ip burst=50 delay=2;

	limit_req_status 429;

	# # #
	# COMPRESSION

	gzip on;
	gzip_types application/json;

	# # #
	# UPSTREAMS
	# Single upstream pointing to the OCI internal
	# NLB provisioned by the ingress-nginx LoadBalancer Service.

	upstream k8s_ingress {
		least_conn;
		zone k8s_ingress 64K;
		server 10.81.101.150:80 max_fails=3 fail_timeout=5s;
		keepalive 16;
		keepalive_time 120s;
		keepalive_timeout 10s;
	}

	upstream docs_upstream {
		least_conn;
		zone docs_upstream 64K;
		server docs:3000 max_fails=999 fail_timeout=3s;
		keepalive 10;
		keepalive_time 120s;
		keepalive_timeout 10s;
	}

	# # #
	# WEBSOCKET SUPPORT
	# More info: https://nginx.org/en/docs/http/websocket.html

	map $http_upgrade $connection_upgrade {
		default upgrade;
		''      close;
	}

	# # #
	# HTTP SERVER
	# Redirect to HTTPS

	server {

		listen 80;
		listen [::]:80;
		server_name go.tmlmobilidade.pt;
		server_tokens off;

		location /.well-known/acme-challenge/ {
			root /var/www/certbot;
		}

		location / {
			return 301 https://$host$request_uri;
		}

	}

	# # #
	# HTTPS SERVER

	server {

		# # #
		# Listen on HTTPS:443

		listen 443 ssl;
		listen [::]:443 ssl;
		server_name go.tmlmobilidade.pt;
		server_tokens off;
		http2 on;

		# # #
		# Lets Encrypt Certificates

		ssl_certificate /etc/letsencrypt/live/go.tmlmobilidade.pt/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/go.tmlmobilidade.pt/privkey.pem;
		include /etc/letsencrypt/options-ssl-nginx.conf;
		ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
		ssl_early_data on;

		# # #
		# Server limits

		client_max_body_size 1G;
		client_body_timeout 5m;

		# # #
		# Proxy configuration

		proxy_http_version 1.1;
		proxy_connect_timeout 10s;
		proxy_send_timeout 20s;
		proxy_read_timeout 20s;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Real-IP $remote_addr;

		# # #
		# WebSocket support

		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;

		# # #
		# Handle proxy errors

		proxy_next_upstream error timeout http_500;
		proxy_intercept_errors on;

		# error_page 404 /not-found.html;
		# error_page 501 502 503 504 /error.html;

		# location = /not-found.html {
		# 	root /var/www/html;
		# }

		# location = /error.html {
		# 	root /var/www/html;
		# }

		# # #
		# All traffic is forwarded to the k8s ingress-nginx controller.
		# Path-based routing is handled inside the cluster by Ingress resources.

		location = / {
			proxy_pass http://docs_upstream;
		}

		location /reference {
			proxy_pass http://docs_upstream;
		}

		location /lab {
			proxy_pass http://docs_upstream;
		}

		location / {
			proxy_pass http://k8s_ingress;
		}

		# Enable for basic statistics
		# location = /basic_status {
		# 	stub_status;
		# }

	}

}
