apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: exporter-export-drt
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-exporter
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    environment: prd
    module: exporter
    app: export-drt
    resources:
      memory_max: "2Gi"
    replicas: 1
    service:
      targetPort: 5050
    ingress:
      enabled: false
    secrets:
      - prd-platform-storage
      - prd-module-exporter
    env: []
