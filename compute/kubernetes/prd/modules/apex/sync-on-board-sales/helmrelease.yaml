apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: apex-sync-on-board-sales
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-apex
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    environment: prd
    module: apex
    app: sync-on-board-sales
    replicas: 1
    service:
      targetPort: 5050
    ingress:
      enabled: false
    secrets:
      - prd-module-apex
    env: []