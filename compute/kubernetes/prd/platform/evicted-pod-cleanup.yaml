apiVersion: v1
kind: ServiceAccount
metadata:
  name: evicted-pod-cleanup
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: evicted-pod-cleanup
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: evicted-pod-cleanup
subjects:
  - kind: ServiceAccount
    name: evicted-pod-cleanup
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: evicted-pod-cleanup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: evicted-pod-cleanup
  namespace: kube-system
spec:
  schedule: "*/1 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      template:
        spec:
          serviceAccountName: evicted-pod-cleanup
          restartPolicy: Never
          containers:
            - name: cleanup
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Cleaning up evicted and failed pods..."
                  kubectl get pods --all-namespaces --field-selector=status.phase=Failed -o json | \
                    kubectl delete -f - 2>/dev/null || true
                  echo "Done."
