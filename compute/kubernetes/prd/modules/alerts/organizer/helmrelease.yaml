apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alerts-organizer
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-alerts
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: alerts-organizer
    module: alerts
    namespace: prd-alerts
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-alerts-organizer
      tag: staging
      pullPolicy: IfNotPresent
    service:
      port: 80
      targetPort: 5050
    ingress:
      enabled: false
    secrets:
      - prd-platform-environment
      - prd-platform-storage
      - prd-module-alerts
    env: []
