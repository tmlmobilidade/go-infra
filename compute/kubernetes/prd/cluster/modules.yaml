apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prd-modules
  namespace: flux-system
spec:
  dependsOn:
    - name: prd-platform
  # How often the kustomization should be reconciled.
  # Keep this moderate to avoid excessive controller churn.
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./compute/kubernetes/prd/modules
  prune: true
