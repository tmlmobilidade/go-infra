apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: controller-sams-examiner
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-controller
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: controller-sams-examiner
    module: controller
    namespace: prd-controller
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-controller-sams-examiner
      tag: staging
      pullPolicy: IfNotPresent
    secrets:
      - prd-platform-environment
      - prd-module-controller
    env: []
