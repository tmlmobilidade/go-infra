apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: performance-sync-metrics-hourly
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-performance
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    environment: prd
    module: performance
    app: sync-metrics-hourly
    replicas: 1
    resources:
      memory: 2Gi
    service:
      targetPort: 5050
    ingress:
      enabled: false
    secrets:
      - prd-module-performance
    env: []
