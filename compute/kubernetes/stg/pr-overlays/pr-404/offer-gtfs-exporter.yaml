apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pr-404-offer-gtfs-exporter
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: pr-404-offer
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    module: offer
    app: gtfs-exporter
    replicas: 1
    service:
      targetPort: 5050
    ingress:
      enabled: true
      path: /offer/gtfs-exporter(/|$)(.*)
      pathType: ImplementationSpecific
      annotations:
        nginx.ingress.kubernetes.io/use-regex: "true"
        nginx.ingress.kubernetes.io/rewrite-target: /$2
      host: pr-404.go-stg.tmlmobilidade.pt
    secrets:
      - stg-module-offer
      - stg-platform-storage
    env: []
    environment: pr-404
