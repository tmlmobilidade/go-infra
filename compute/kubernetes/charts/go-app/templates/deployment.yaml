apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
    module: {{ .Values.module }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        module: {{ .Values.module }}
    spec:
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          envFrom:
            # App-specific secret (must exist)
            - secretRef:
                name: {{ (split "-" .Release.Namespace)._1 }}-app-{{ .Values.name }}
            # Module-shared secret (must exist)
            - secretRef:
                name: {{ (split "-" .Release.Namespace)._1 }}-module-{{ .Values.module }}
            # Platform capability secrets (user-specified, optional)
            {{- range .Values.platformSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          {{- if .Values.env }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
