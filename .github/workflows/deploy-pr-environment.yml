name: Build and Deploy PR Environment

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - { module: alerts, app: api, port: 5050 }
          - { module: alerts, app: frontend, port: 3000 }
          - { module: alerts, app: organizer, port: 5050 }
          - { module: apex, app: organizer, port: 5050 }
          - { module: apex, app: stream, port: 5050 }
          - { module: apex, app: sync-locations, port: 5050 }
          - { module: apex, app: sync-on-board-refunds, port: 5050 }
          - { module: apex, app: sync-on-board-sales, port: 5050 }
          - { module: apex, app: sync-validations, port: 5050 }
          - { module: auth, app: api, port: 5050 }
          - { module: auth, app: cleaner, port: 5050 }
          - { module: auth, app: frontend, port: 3000 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image for ${{ matrix.app.module }}-${{ matrix.app.app }}
        uses: docker/build-push-action@v5
        with:
          # Build context path — adjust based on your repo structure
          context: ./${{ matrix.app.module }}/${{ matrix.app.app }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/go-${{ matrix.app.module }}-${{ matrix.app.app }}:pr-${{ env.PR_NUMBER }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/go-${{ matrix.app.module }}-${{ matrix.app.app }}:pr-${{ env.PR_NUMBER }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  generate-k8s-manifests:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    permissions:
      contents: write
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: tmlmobilidade/go-infra
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate PR overlay manifests
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          PR_DIR="compute/kubernetes/apps/stg/pr-overlays/pr-${PR_NUMBER}"
          mkdir -p "$PR_DIR"

          # Define apps per module
          declare -A APPS=(
            [alerts]="api frontend organizer"
            [apex]="organizer stream sync-locations sync-on-board-refunds sync-on-board-sales sync-validations"
            [auth]="api cleaner frontend"
          )

          # Define ports (default 5050, 3000 for frontends)
          declare -A PORTS=(
            [alerts_frontend]=3000
            [auth_frontend]=3000
          )

          # Shared platform capabilities available in stg.
          PLATFORM_CAPABILITIES=(
            environment
            storage
            email
            pcgi-legacy
            pcgi-validations
            pcgi-ticketing
            pcgi-file-manager
          )

          # Generate namespace + module/platform OnePasswordItem manifests
          for MODULE in alerts apex auth; do
            cat > "$PR_DIR/${MODULE}-namespace.yaml" <<EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: ${MODULE}-stg-pr-${PR_NUMBER}
          EOF

            cat > "$PR_DIR/${MODULE}-module-shared.1passworditem.yaml" <<EOF
          apiVersion: onepassword.com/v1
          kind: OnePasswordItem
          metadata:
            name: ${MODULE}-shared-stg
            namespace: ${MODULE}-stg-pr-${PR_NUMBER}
            annotations:
              operator.1password.io/auto-restart: "true"
          spec:
            itemPath: vaults/k8s/items/${MODULE}-shared-stg
          EOF

            for CAPABILITY in "${PLATFORM_CAPABILITIES[@]}"; do
              cat > "$PR_DIR/${MODULE}-platform-${CAPABILITY}.1passworditem.yaml" <<EOF
          apiVersion: onepassword.com/v1
          kind: OnePasswordItem
          metadata:
            name: platform-${CAPABILITY}-stg
            namespace: ${MODULE}-stg-pr-${PR_NUMBER}
            annotations:
              operator.1password.io/auto-restart: "true"
          spec:
            itemPath: vaults/k8s/items/platform-${CAPABILITY}-stg
          EOF
            done
          done

          # Generate app OnePasswordItem + HelmRelease for each app
          for MODULE in alerts apex auth; do
            for APP in ${APPS[$MODULE]}; do
              # Determine port
              PORT=${PORTS[${MODULE}_${APP}]:-5050}
              # Determine if ingress should be enabled
              if [[ $APP == "api" ]] || [[ $APP == "frontend" ]]; then
                INGRESS_ENABLED="true"
              else
                INGRESS_ENABLED="false"
              fi

              # App-specific secret for this PR namespace
              cat > "$PR_DIR/${MODULE}-${APP}.1passworditem.yaml" <<EOF
          apiVersion: onepassword.com/v1
          kind: OnePasswordItem
          metadata:
            name: ${MODULE}-${APP}-stg
            namespace: ${MODULE}-stg-pr-${PR_NUMBER}
            annotations:
              operator.1password.io/auto-restart: "true"
          spec:
            itemPath: vaults/k8s/items/${MODULE}-${APP}-stg
          EOF

              PLATFORM_SECRETS="      - platform-environment-stg"
              if [[ $APP == "api" ]] || [[ $APP == "frontend" ]]; then
                PLATFORM_SECRETS="$PLATFORM_SECRETS\n      - platform-email-stg\n      - platform-storage-stg"
              else
                PLATFORM_SECRETS="$PLATFORM_SECRETS\n      - platform-storage-stg"
              fi

              cat > "$PR_DIR/${MODULE}-${APP}.yaml" <<EOF
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: ${MODULE}-${APP}
            namespace: flux-system
          spec:
            interval: 5m
            dependsOn:
              - name: onepassword-connect
            targetNamespace: ${MODULE}-stg-pr-${PR_NUMBER}
            install:
              createNamespace: true
            chart:
              spec:
                chart: compute/kubernetes/charts/go-app
                sourceRef:
                  kind: GitRepository
                  name: flux-system
                  namespace: flux-system
                reconcileStrategy: Revision
            values:
              name: ${MODULE}-${APP}
              module: ${MODULE}
              namespace: ${MODULE}-stg-pr-${PR_NUMBER}
              replicas: 1
              image:
                repository: ghcr.io/tmlmobilidade/go-${MODULE}-${APP}
                tag: pr-${PR_NUMBER}
                pullPolicy: Always
              service:
                port: 80
                targetPort: ${PORT}
              ingress:
                enabled: ${INGRESS_ENABLED}
                className: nginx
                host: pr-${PR_NUMBER}.go-stg.tmlmobilidade.pt
                path: /${MODULE}$([[ $APP == api ]] && echo "/api" || echo "")(/|$$)(.*)
                pathType: ImplementationSpecific
                annotations:
                  nginx.ingress.kubernetes.io/use-regex: "true"
                  nginx.ingress.kubernetes.io/rewrite-target: /$$2
              platformSecrets:
          $(echo -e "$PLATFORM_SECRETS")
              env: []
          EOF
            done
          done

          # Generate kustomization.yaml
          RESOURCES=""
          for MODULE in alerts apex auth; do
            RESOURCES="$RESOURCES  - ${MODULE}-namespace.yaml\n"
            RESOURCES="$RESOURCES  - ${MODULE}-module-shared.1passworditem.yaml\n"
            for CAPABILITY in "${PLATFORM_CAPABILITIES[@]}"; do
              RESOURCES="$RESOURCES  - ${MODULE}-platform-${CAPABILITY}.1passworditem.yaml\n"
            done
            for APP in ${APPS[$MODULE]}; do
              RESOURCES="$RESOURCES  - ${MODULE}-${APP}.1passworditem.yaml\n"
              RESOURCES="$RESOURCES  - ${MODULE}-${APP}.yaml\n"
            done
          done

          cat > "$PR_DIR/kustomization.yaml" <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources:
          $(echo -e "$RESOURCES")
          EOF

          echo "Generated manifests in $PR_DIR"
          ls -la "$PR_DIR"

      - name: Commit manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add compute/kubernetes/apps/stg/pr-overlays/pr-${{ github.event.pull_request.number }}/
          git commit -m "chore: generate k8s manifests for PR #${{ github.event.pull_request.number }}" || echo "No changes to commit"
          git push

  cleanup-closed-pr:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: tmlmobilidade/go-infra
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove PR overlay on close
        run: |
          PR_DIR="compute/kubernetes/apps/stg/pr-overlays/pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            rm -rf "$PR_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add compute/kubernetes/apps/stg/pr-overlays/
            git commit -m "chore: remove k8s manifests for closed PR #${{ github.event.pull_request.number }}"
            git push
          fi
