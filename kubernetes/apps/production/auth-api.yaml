apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auth-api
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: auth-prd
  install:
    createNamespace: true
  chart:
    spec:
      chart: kubernetes/charts/auth-api
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: auth-api
    namespace: auth-prd
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go/auth-api
      tag: production
      pullPolicy: IfNotPresent
    service:
      port: 80
      targetPort: 5050
    ingress:
      enabled: true
      className: nginx
      host: go.tmlmobilidade.pt
      path: /auth/api
      annotations: {}
    sharedSecrets:
      - auth-shared-secrets
    env: []
