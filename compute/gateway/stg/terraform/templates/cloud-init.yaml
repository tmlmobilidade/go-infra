#cloud-config

packages:
  - xfsprogs

runcmd:

  # 1.
  # Configure the firewall to allow Gateway traffic
  # using the script pre-packed by Packer

  - /opt/app/firewall.sh
  - rm /opt/app/firewall.sh

  # 2.
  # Write Cloudflare API token
  # This is needed for Certbot to obtain and renew SSL certificates for the Gateway.
  # The token is injected via Terraform as a base64-encoded string.

  - mkdir -p /opt/app/secrets
  - echo "${base64encode(cloudflare_token_file)}" | base64 -d > /opt/app/secrets/cloudflare.token
  - chmod 400 /opt/app/secrets/cloudflare.token
  - chown 999:999 /opt/app/secrets/cloudflare.token

  # 2.
  # Init the Docker compose configuration
  # and run the init-letsencrypt.sh script
  # to obtain SSL certificates for the Gateway

  - cd /opt/app
  - docker compose up -d --build --force-recreate --remove-orphans --pull=always

  # This is intentionally disabled because wildcard certificates (*.sub.domain.com)
  # must be obtained manually via DNS validation, which requires Cloudflare Dashboard access.
  # - sh init-letsencrypt.sh

final_message: "Gateway configuration complete."
