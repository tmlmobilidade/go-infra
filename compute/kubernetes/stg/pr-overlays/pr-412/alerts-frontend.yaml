apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pr-412-alerts-frontend
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: pr-412-alerts
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    environment: pr-412
    module: alerts
    app: frontend
    replicas: 1
    service:
      targetPort: 3000
    ingress:
      enabled: true
      path: /alerts
      pathType: Prefix
      host: pr-412.go-stg.tmlmobilidade.pt
    secrets:
      - stg-platform-email
      - stg-platform-storage
    env: []
