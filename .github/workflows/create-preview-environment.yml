# # #

name: Create Preview Environment

on:
  repository_dispatch:
    types: [preview-pr]

concurrency:
  group: pr-${{ github.event.client_payload.pr }}
  cancel-in-progress: true

jobs:

  generate-k8s-manifests:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate PR overlay manifests
        run: |
          set -euo pipefail

          PR_DIR="compute/kubernetes/stg/modules/pr-overlays/pr-${{ github.event.client_payload.pr }}"
          mkdir -p "$PR_DIR"

          # Define apps per module
          declare -A APPS=(
            [alerts]="api frontend organizer"
            [apex]="organizer stream sync-locations sync-on-board-refunds sync-on-board-sales sync-validations"
            [auth]="api cleaner frontend"
          )

          # Define ports (default 5050, 3000 for frontends)
          declare -A PORTS=(
            [alerts_frontend]=3000
            [auth_frontend]=3000
          )

          # Shared platform capabilities available in stg.
          PLATFORM_CAPABILITIES=(
            environment
            storage
            email
            pcgi-legacy
            pcgi-validations
            pcgi-ticketing
            pcgi-file-manager
          )

          # Generate namespace + module/platform OnePasswordItem manifests
          for MODULE in alerts apex auth; do
            cat > "$PR_DIR/${MODULE}-namespace.yaml" <<EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: ${MODULE}-stg-pr-${{ github.event.client_payload.pr }}
          EOF

            cat > "$PR_DIR/${MODULE}-module-shared.1passworditem.yaml" <<EOF
          apiVersion: onepassword.com/v1
          kind: OnePasswordItem
          metadata:
            name: ${MODULE}-shared-stg
            namespace: ${MODULE}-stg-pr-${{ github.event.client_payload.pr }}
            annotations:
              operator.1password.io/auto-restart: "true"
          spec:
            itemPath: vaults/go-prd/items/${MODULE}-shared-stg
          EOF

            for CAPABILITY in "${PLATFORM_CAPABILITIES[@]}"; do
              cat > "$PR_DIR/${MODULE}-platform-${CAPABILITY}.1passworditem.yaml" <<EOF
          apiVersion: onepassword.com/v1
          kind: OnePasswordItem
          metadata:
            name: platform-${CAPABILITY}-stg
            namespace: ${MODULE}-stg-pr-${{ github.event.client_payload.pr }}
            annotations:
              operator.1password.io/auto-restart: "true"
          spec:
            itemPath: vaults/go-prd/items/platform-${CAPABILITY}-stg
          EOF
            done
          done

          # Generate app OnePasswordItem + HelmRelease for each app
          for MODULE in alerts apex auth; do
            for APP in ${APPS[$MODULE]}; do
              # Determine port
              PORT=${PORTS[${MODULE}_${APP}]:-5050}
              # Determine if ingress should be enabled
              if [[ $APP == "api" ]] || [[ $APP == "frontend" ]]; then
                INGRESS_ENABLED="true"
              else
                INGRESS_ENABLED="false"
              fi

              # App-specific secret for this PR namespace
              cat > "$PR_DIR/${MODULE}-${APP}.1passworditem.yaml" <<EOF
          apiVersion: onepassword.com/v1
          kind: OnePasswordItem
          metadata:
            name: ${MODULE}-${APP}-stg
            namespace: ${MODULE}-stg-pr-${{ github.event.client_payload.pr }}
            annotations:
              operator.1password.io/auto-restart: "true"
          spec:
            itemPath: vaults/go-prd/items/${MODULE}-${APP}-stg
          EOF

              PLATFORM_SECRETS="      - platform-environment-stg"
              if [[ $APP == "api" ]] || [[ $APP == "frontend" ]]; then
                PLATFORM_SECRETS="$PLATFORM_SECRETS\n      - platform-email-stg\n      - platform-storage-stg"
              else
                PLATFORM_SECRETS="$PLATFORM_SECRETS\n      - platform-storage-stg"
              fi

              cat > "$PR_DIR/${MODULE}-${APP}.yaml" <<EOF
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: ${MODULE}-${APP}
            namespace: flux-system
          spec:
            interval: 5m
            dependsOn:
              - name: onepassword-connect
            targetNamespace: ${MODULE}-stg-pr-${{ github.event.client_payload.pr }}
            install:
              createNamespace: true
            chart:
              spec:
                chart: compute/kubernetes/charts/go-app
                sourceRef:
                  kind: GitRepository
                  name: flux-system
                  namespace: flux-system
                reconcileStrategy: Revision
            values:
              name: ${MODULE}-${APP}
              module: ${MODULE}
              namespace: ${MODULE}-stg-pr-${{ github.event.client_payload.pr }}
              replicas: 1
              image:
                repository: ghcr.io/tmlmobilidade/go-${MODULE}-${APP}
                tag: pr-${{ github.event.client_payload.pr }}
                pullPolicy: Always
              service:
                port: 80
                targetPort: ${PORT}
              ingress:
                enabled: ${INGRESS_ENABLED}
                className: nginx
                host: pr-${{ github.event.client_payload.pr }}.go-stg.tmlmobilidade.pt
                path: /${MODULE}$([[ $APP == api ]] && echo "/api" || echo "")(/|$$)(.*)
                pathType: ImplementationSpecific
                annotations:
                  nginx.ingress.kubernetes.io/use-regex: "true"
                  nginx.ingress.kubernetes.io/rewrite-target: /$$2
              secrets:
          $(echo -e "$PLATFORM_SECRETS")
              env: []
          EOF
            done
          done

          # Generate kustomization.yaml
          RESOURCES=""
          for MODULE in alerts apex auth; do
            RESOURCES="$RESOURCES  - ${MODULE}-namespace.yaml\n"
            RESOURCES="$RESOURCES  - ${MODULE}-module-shared.1passworditem.yaml\n"
            for CAPABILITY in "${PLATFORM_CAPABILITIES[@]}"; do
              RESOURCES="$RESOURCES  - ${MODULE}-platform-${CAPABILITY}.1passworditem.yaml\n"
            done
            for APP in ${APPS[$MODULE]}; do
              RESOURCES="$RESOURCES  - ${MODULE}-${APP}.1passworditem.yaml\n"
              RESOURCES="$RESOURCES  - ${MODULE}-${APP}.yaml\n"
            done
          done

          cat > "$PR_DIR/kustomization.yaml" <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources:
          $(echo -e "$RESOURCES")
          EOF

          echo "Generated manifests in $PR_DIR"
          ls -la "$PR_DIR"

      - name: Commit manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add compute/kubernetes/stg/modules/pr-overlays/pr-${{ github.event.client_payload.pr }}/
          git commit -m "chore: generate k8s manifests for PR #${{ github.event.client_payload.pr }}" || echo "No changes to commit"
          git push

  cleanup-closed-pr:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: tmlmobilidade/go-infra
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove PR overlay on close
        run: |
          PR_DIR="compute/kubernetes/stg/modules/pr-overlays/pr-${{ github.event.client_payload.pr }}"
          if [ -d "$PR_DIR" ]; then
            rm -rf "$PR_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add compute/kubernetes/stg/modules/pr-overlays/
            git commit -m "chore: remove k8s manifests for closed PR #${{ github.event.client_payload.pr }}"
            git push
          fi
