apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alerts-frontend
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-alerts
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: alerts-frontend
    module: alerts
    namespace: prd-alerts
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-alerts-frontend
      tag: staging
      pullPolicy: IfNotPresent
    service:
      port: 80
      targetPort: 3000
    ingress:
      enabled: true
      className: nginx
      host: go-stg.tmlmobilidade.pt
      path: /alerts
      pathType: Prefix
    secrets:
      - prd-platform-environment
    env: []
