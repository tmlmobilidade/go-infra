apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dates-frontend
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: stg-dates
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: dates-frontend
    module: dates
    namespace: stg-dates
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-dates-frontend
      tag: staging
      pullPolicy: Always
    service:
      port: 80
      targetPort: 3000
    ingress:
      enabled: true
      className: nginx
      host: go-stg.tmlmobilidade.pt
      path: /dates
      pathType: Prefix
    secrets:
      - stg-platform-email
      - stg-platform-storage
    env: []
