#cloud-config

# -----------------------------------------------------------------------
# cloud-init.yaml — ClickHouse Replica Node (node_index = ${node_index})
#
# Docker and OS tuning are pre-baked into the Packer image.
# This file handles runtime concerns only:
#   - Attaches and mounts the 1TB block volume
#   - Writes ClickHouse Keeper config (embedded keeper, 3-node Raft quorum)
#   - Writes ZooKeeper client config (points CH to keeper endpoints)
#   - Writes replica macros and cluster config
#   - Writes secrets and starts the container
#
# Terraform variables injected:
#   node_index, all_private_ips, clickhouse_admin_password,
#   clickhouse_http_port, clickhouse_tcp_port
#
# Note: ports are hardcoded in packer/templates/compose.yaml
#   and only referenced here for the XML configuration files.
# -----------------------------------------------------------------------

packages:
  - xfsprogs

runcmd:

  # 1.
  # Attach and mount the block volume
  # using the script pre-packed by Packer

  - /opt/app/attach-volume.sh
  - rm /opt/app/attach-volume.sh

  # 2.
  # Configure the firewall to allow ClickHouse traffic
  # using the script pre-packed by Packer

  - /opt/app/firewall.sh
  - rm /opt/app/firewall.sh

  # 3.
  # Setup ClickHouse Directories
  # using the script pre-packed by Packer

  - /opt/app/setup-clickhouse.sh
  - rm /opt/app/setup-clickhouse.sh

  # 4.
  # Network Config to instruct Clickhouse to listen
  # on all network interfaces (IPv4 only). `interserver_http_host`
  # sets the current node's private IP to allow cluster communication.

  - |
    cat > /opt/app/persistent-data/config.d/network.xml <<'NETEOF'
    <clickhouse>
        <listen_host>0.0.0.0</listen_host>
        <interserver_http_host>${all_private_ips[node_index]}</interserver_http_host>
    </clickhouse>
    NETEOF

  # 5.
  # ZooKeeper Client Config (replicated 3-node Keeper cluster)
  # Points ClickHouse at all 3 Keeper nodes for high availability.
  # If a Keeper node is down, ClickHouse will automatically failover
  # to the next available node.

  - |
    cat > /opt/app/persistent-data/config.d/keeper.xml <<'KEEPEREOF'
    <clickhouse>
        <keeper_server>
            <!-- ZooKeeper-compatible client port -->
            <tcp_port>2181</tcp_port>
            <!-- Unique server ID for this node (1, 2, or 3) -->
            <server_id>${node_index + 1}</server_id>
            <log_storage_path>/var/lib/clickhouse/coordination/log</log_storage_path>
            <snapshot_storage_path>/var/lib/clickhouse/coordination/snapshots</snapshot_storage_path>
            <coordination_settings>
                <operation_timeout_ms>10000</operation_timeout_ms>
                <session_timeout_ms>30000</session_timeout_ms>
                <raft_logs_level>warning</raft_logs_level>
            </coordination_settings>
            <raft_configuration>
            %{ for idx in range(length(all_private_ips)) ~}
                <server>
                    <id>${idx + 1}</id>
                    <hostname>${all_private_ips[idx]}</hostname>
                    <!-- Inter-keeper Raft port -->
                    <port>9444</port>
                </server>
            %{ endfor ~}
            </raft_configuration>
        </keeper_server>
    </clickhouse>
    KEEPEREOF

  # 6.
  # ZooKeeper Client Config — points ClickHouse at all 3 Keeper nodes
  # Points ClickHouse at all 3 Keeper nodes for high availability.
  # If a Keeper node is down, ClickHouse will automatically failover
  # to the next available node.

  - |
    cat > /opt/app/persistent-data/config.d/zookeeper.xml <<'ZKEOF'
    <clickhouse>
        <zookeeper>
        %{ for node_ip in all_private_ips ~}
            <node>
                <host>${node_ip}</host>
                <port>2181</port>
            </node>
        %{ endfor ~}
        </zookeeper>
    </clickhouse>
    ZKEOF

  # 7.
  # Replica Macros
  # node-specific identity for ReplicatedMergeTree

  - |
    cat > /opt/app/persistent-data/config.d/macros.xml <<'MACROEOF'
    <clickhouse>
        <macros>
            <shard>01</shard>
            <replica>replica-${node_index + 1}</replica>
            <cluster>default_cluster</cluster>
        </macros>
    </clickhouse>
    MACROEOF

  # 8.
  # Cluster Config — all 3 replicas in one shard (no sharding)

  - |
    cat > /opt/app/persistent-data/config.d/cluster.xml <<'CLUSTEREOF'
    <clickhouse>
        <remote_servers>
            <default_cluster>
                <shard>
                %{ for ip in all_private_ips ~}
                  <replica>
                      <host>${ip}</host>
                      <port>${clickhouse_tcp_port}</port>
                  </replica>
                %{ endfor ~}
                  <internal_replication>true</internal_replication>
                </shard>
            </default_cluster>
        </remote_servers>
    </clickhouse>
    CLUSTEREOF

  # 9.
  # Performance Tuning Config (server-level)

  - |
    cat > /opt/app/persistent-data/config.d/tuning.xml <<'TUNEOEOF'
    <clickhouse>
        <!-- Server-level memory: 85% of 12GB = ~10.2GB -->
        <max_server_memory_usage_to_ram_ratio>0.85</max_server_memory_usage_to_ram_ratio>
        <uncompressed_cache_size>2147483648</uncompressed_cache_size>
        <mark_cache_size>2147483648</mark_cache_size>
        <!-- Enable Prometheus metrics -->
        <prometheus>
            <endpoint>/metrics</endpoint>
            <port>9363</port>
            <metrics>true</metrics>
            <events>true</events>
        </prometheus>
    </clickhouse>
    TUNEOEOF

  # 10.
  # User Profile Config (user-level memory limit, CH 26+)

  - |
    cat > /opt/app/persistent-data/users.d/tuning.xml <<'USERUEOF'
    <clickhouse>
        <profiles>
            <default>
                <max_memory_usage>10G</max_memory_usage>
            </default>
        </profiles>
    </clickhouse>
    USERUEOF

  # 10.
  # Write Secrets

  - |
    mkdir -p /opt/app/secrets
    cat > /opt/app/secrets/.env <<'ENVEOF'
    CLICKHOUSE_PASSWORD=${clickhouse_admin_password}
    CLICKHOUSE_USER=admin
    ENVEOF

  # 11.
  # Start ClickHouse

  - cd /opt/app && docker compose up -d --build --force-recreate --remove-orphans --pull=always

final_message: "ClickHouse replica node ${node_index + 1} of ${length(all_private_ips)} configuration complete."
