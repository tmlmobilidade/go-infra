apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: performance-frontend
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-performance
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    environment: prd
    module: performance
    app: frontend
    replicas: 1
    service:
      targetPort: 3000
    ingress:
      enabled: true
      path: /performance
      pathType: Prefix
    env: []
