apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pr-overlays
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-stg
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./compute/kubernetes/modules/stg/pr-overlays
  prune: true
