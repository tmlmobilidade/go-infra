apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-prd
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-prd
  # How often the kustomization should be reconciled.
  # The default is 5m0s (5 minutes).
  interval: 10s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/prd
  prune: true
