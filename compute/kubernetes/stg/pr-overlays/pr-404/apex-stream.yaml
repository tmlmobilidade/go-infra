apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pr-404-apex-stream
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: pr-404-apex
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    module: apex
    replicas: 1
    service:
      targetPort: 5050
    ingress:
      enabled: false
      host: pr-404.go-stg.tmlmobilidade.pt
    secrets:
      - stg-platform-storage
    env: []
    environment: pr-404
    app: stream
