apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fleet-frontend
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: stg-fleet
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    module: fleet
    replicas: 1
    service:
      targetPort: 3000
    ingress:
      enabled: true
      path: /fleet
      pathType: Prefix
    secrets:
      - stg-platform-email
      - stg-platform-storage
    env: []
    environment: stg
    app: frontend
