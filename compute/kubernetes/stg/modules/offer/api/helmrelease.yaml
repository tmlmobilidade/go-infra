apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: offer-api
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: stg-offer
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: offer-api
    module: offer
    namespace: stg-offer
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-offer-api
      tag: staging
      pullPolicy: IfNotPresent
    service:
      port: 80
      targetPort: 5050
    ingress:
      enabled: true
      className: nginx
      host: go-stg.tmlmobilidade.pt
      path: /offer/api(/|$)(.*)
      pathType: ImplementationSpecific
      annotations:
        nginx.ingress.kubernetes.io/use-regex: "true"
        nginx.ingress.kubernetes.io/rewrite-target: /$2
    platformSecrets:
      - stg-platform-email
      - stg-platform-storage
    env: []
