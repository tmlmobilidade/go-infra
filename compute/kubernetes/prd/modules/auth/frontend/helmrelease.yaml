apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auth-frontend
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-auth
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: auth-frontend
    module: auth
    namespace: prd-auth
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-auth-frontend
      tag: staging
      pullPolicy: Always
    service:
      port: 80
      targetPort: 3000
    ingress:
      enabled: true
      className: nginx
      host: go-stg.tmlmobilidade.pt
      path: /auth
      pathType: Prefix
    secrets:
      - prd-platform-environment
    env: []
