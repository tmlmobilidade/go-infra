apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alerts-organizer
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: alerts-stg-pr-304
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: alerts-organizer
    module: alerts
    namespace: alerts-stg-pr-304
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-alerts-organizer
      tag: pr-304
      pullPolicy: Always
    service:
      port: 80
      targetPort: 5050
    ingress:
      enabled: false
      className: nginx
      host: pr-304.go-stg.tmlmobilidade.pt
      path: /alerts(/|2299)(.*)
      pathType: ImplementationSpecific
      annotations:
        nginx.ingress.kubernetes.io/use-regex: "true"
        nginx.ingress.kubernetes.io/rewrite-target: /22992
    secrets:
      - platform-environment-stg
      - platform-storage-stg
    env: []
