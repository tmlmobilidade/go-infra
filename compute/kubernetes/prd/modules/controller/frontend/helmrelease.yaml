apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: controller-frontend
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-controller
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: controller-frontend
    module: controller
    namespace: prd-controller
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-controller-frontend
      tag: latest
      pullPolicy: IfNotPresent
    service:
      port: 80
      targetPort: 3000
    ingress:
      enabled: true
      className: nginx
      host: go-stg.tmlmobilidade.pt
      path: /controller(/|$)(.*)
      pathType: ImplementationSpecific
      annotations:
        nginx.ingress.kubernetes.io/use-regex: "true"
        nginx.ingress.kubernetes.io/rewrite-target: /$2
    platformSecrets:
      - prd-platform-email
      - prd-platform-storage
    env: []
