apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plans-validator
  namespace: flux-system
spec:
  interval: 30s
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-plans
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    environment: prd
    module: plans
    app: validator
    replicas: 1
    service:
      targetPort: 5050
    resources:
      cpu: 2
      memory: 4Gi
    ingress:
      enabled: false
    secrets:
      - prd-platform-storage
      - prd-module-plans
      - prd-platform-email
    env: []