apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: offer-gtfs-importer
  namespace: flux-system
spec:
  interval: 30s
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-offer
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    environment: prd
    module: offer
    app: gtfs-importer
    replicas: 1
    service:
      targetPort: 5050
    ingress:
      enabled: true
      path: /offer/gtfs-importer(/|$)(.*)
      pathType: ImplementationSpecific
      annotations:
        nginx.ingress.kubernetes.io/use-regex: "true"
        nginx.ingress.kubernetes.io/rewrite-target: /$2
    secrets:
      - prd-module-offer
      - prd-platform-storage
    env: []
