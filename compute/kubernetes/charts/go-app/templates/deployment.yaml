apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.environment }}-{{ .Values.module }}-{{ .Values.app }}"
  namespace: "{{ .Values.environment }}-{{ .Values.module }}"
  labels:
    environment: {{ .Values.environment }}
    module: {{ .Values.module }}
    app: {{ .Values.app }}
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/match-tag: "true"
    keel.sh/pollSchedule: "@every 30s"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      environment: {{ .Values.environment }}
      module: {{ .Values.module }}
      app: {{ .Values.app }}
  template:
    metadata:
      labels:
        environment: {{ .Values.environment }}
        module: {{ .Values.module }}
        app: {{ .Values.app }}
    spec:
      containers:
        - name: "{{ .Values.environment }}-{{ .Values.module }}-{{ .Values.app }}"
          image: "ghcr.io/tmlmobilidade/go-{{ .Values.module }}-{{ .Values.app }}:{{ .Values.environment }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "200Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "1Gi"
          envFrom:
            {{- range .Values.secrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          {{- if .Values.env }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
