apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: apex-organizer
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: apex-prd
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: apex-organizer
    module: apex
    namespace: apex-prd
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-apex-organizer
      tag: latest
      pullPolicy: IfNotPresent
    service:
      port: 80
      targetPort: 5050
    ingress:
      enabled: false
    platformSecrets:
      - platform-storage-prd
    env: []
