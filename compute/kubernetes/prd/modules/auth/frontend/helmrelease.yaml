apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auth-frontend
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: prd-auth
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    environment: prd
    module: auth
    app: frontend
    replicas: 1
    service:
      targetPort: 3000
    ingress:
      enabled: true
      path: /auth
      pathType: Prefix
    secrets:
      - prd-platform-environment
    env:
      - name: ENVIRONMENT
        value: "prd"
      - name: HOSTNAME
        value: "0.0.0.0"
