apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: offer-frontend
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: onepassword-connect
  targetNamespace: stg-offer
  install:
    createNamespace: true
  chart:
    spec:
      chart: compute/kubernetes/charts/go-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    name: offer-frontend
    module: offer
    namespace: stg-offer
    replicas: 1
    image:
      repository: ghcr.io/tmlmobilidade/go-offer-frontend
      tag: staging
      pullPolicy: IfNotPresent
    service:
      port: 80
      targetPort: 3000
    ingress:
      enabled: true
      className: nginx
      host: go-stg.tmlmobilidade.pt
      path: /offer
      pathType: Prefix
    secrets:
      - stg-platform-email
      - stg-platform-storage
    env: []
